# Here you can define all your data sets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/data/data_catalog.html
_spark_parquet_dataset: &_spark_parquet_dataset
  type: spark.SparkDataset
  file_format: parquet
  save_args:
    mode: overwrite

_excel_dataset: &_excel_dataset
  type: pandas.ExcelDataset

_pandas_parquet_dataset: &_pandas_parquet_dataset
  type: pandas.ParquetDataset

# Segmentation
new_joiner.segmentation_master_filtered@spark:
  <<: *_spark_parquet_dataset
  filepath: data/05_model_input/segmentation/new_joiner/segmentation_master_filtered
  # layer: 05_model_input
  # versioned: true

new_joiner.segmentation_master_filtered@pandas:
  <<: *_pandas_parquet_dataset
  filepath: data/05_model_input/segmentation/new_joiner/segmentation_master_filtered
  # layer: 05_model_input
  # versioned: true

new_joiner.segmentation_master_filtered_prediction@spark:
  <<: *_spark_parquet_dataset
  filepath: data/05_model_input/segmentation/new_joiner/segmentation_master_filtered_prediction
  # layer: 05_model_input
  # versioned: true

new_joiner.segmentation_master_filtered_prediction@pandas:
  <<: *_pandas_parquet_dataset
  filepath: data/05_model_input/segmentation/new_joiner/segmentation_master_filtered_prediction
  # layer: 05_model_input
  # versioned: true

new_joiner.segmentation_model_params_artifact:
  # type: kedro_mlflow.io.models.MlflowModelSaverDataSet
  type: pickle.PickleDataset
  # flavor: mlflow.sklearn
  filepath: data/06_models/segmentation/new_joiner/segmentation_model_artifact_params.pkl
  backend: joblib
  # layer: 06_models
  # versioned: true

new_joiner.segmentation_model_artifact:
  type: pickle.PickleDataset
  filepath: data/06_models/segmentation/new_joiner/segmentation_model_artifact.pkl
  backend: joblib
  # layer: 06_models

new_joiner.segmentation_centroids:
  type: pickle.PickleDataset
  filepath: data/07_model_output/segmentation/new_joiner/segmentation_centroids.pkl
  backend: joblib
  # layer: 07_model_output


new_joiner.segmentation_wcss_feature_importance:
  type: pandas.CSVDataset
  filepath: data/07_model_output/segmentation/new_joiner/segmentation_wcss_feature_importance.csv
  # layer: 07_model_output

new_joiner.segmentation_unsupervised_feature_importance:
  type: pandas.CSVDataset
  filepath: data/07_model_output/segmentation/new_joiner/segmentation_unsupervised_feature_importance.csv
  # layer: 07_model_output


new_joiner.segmentation_model_output@spark:
  <<: *_spark_parquet_dataset
  filepath: data/07_model_output/segmentation/new_joiner/segmentation_model_output.parquet
  # versioned: true
  # layer: 07_model_output


new_joiner.segmentation_model_output@pandas:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/segmentation/new_joiner/segmentation_model_output.parquet
  # versioned: true
  # layer: 07_model_output

# # Save reporting on MLflow artifacts
new_joiner.geographic_cluster_report:
  type: text.TextDataset
  filepath: data/08_reporting/segmentation/new_joiner/html_reports/geographic_new_joiner.html
  fs_args:
    open_args_save:
      encoding: "utf-8"
  # versioned: true
  # layer: 08_reporting


new_joiner.transactional_cluster_report:
  type: text.TextDataset
  filepath: data/08_reporting/segmentation/new_joiner/html_reports/transactional_cluster_report.html
  fs_args:
    open_args_save:
      encoding: "utf-8"
  versioned: true
  # layer: 08_reporting
  # artifact_path: new_joiner/transactional_report

new_joiner.inertia_cluster_plot:
  type: plotly.JSONDataset
  filepath: data/08_reporting/segmentation/new_joiner/plotly/inertia_plot.json
  save_args:
    engine: auto
  # versioned: true
  # layer: 08_reporting
  # artifact_path: new_joiner/inertia_plot


new_joiner.segmentation_excel_report:
  <<: *_excel_dataset
  filepath: data/08_reporting/segmentation/new_joiner/excel_segmentation_report_new_joiner.xlsx
  # layer: 08_reporting
  load_args:
    sheet_name: "median"
  # versioned: true
