
## Highways

saudi_arabia.osm_highways.origin:
    type: segmentation_core.datasets.osm.CustomOSMDataset
    filepath: data/01_raw/saudi_arabia/osm/merged.osm.pbf
    load_args:
        custom_filter: "${globals:OSM_FILTERS.highway_filter}"
        filter_type: keep
        keep_nodes: False
        keep_ways: True
        keep_relations: False
    # layer: origin

saudi_arabia.osm_highways.raw:
  type: geopandas.GenericDataset
  filepath: data/01_raw/saudi_arabia/osm/highways.geojson
#   layer: raw

saudi_arabia.osm_highways.intermediate:
  type: geopandas.GenericDataset
  filepath: data/02_intermediate/saudi_arabia/osm/highways.geojson
#   layer: intermediate

saudi_arabia.osm_highways.primary:
  type: geopandas.GenericDataset
  filepath: data/03_primary/saudi_arabia/osm/highways.geojson
#   layer: primary


