## Subway

saudi_arabia.osm_subway.origin:
    type: segmentation_core.datasets.osm.CustomOSMDataset
    filepath: data/01_raw/saudi_arabia/osm/merged.osm.pbf
    only_tags: True
    #query: "(railway == 'station') & (station == 'subway') & (aerialway != 'station')"
    #query: "(railway == 'station') & (station == 'subway')"
