# Features Brix
# Transactions
transactions.transactions.sequential: True
transactions.transactions.keep_cols: ["_id", "_observ_end_dt"]

# pyspark transactional features
transactions.transactions.sales.instructions:
  - object: feature_generation.v1.core.features.flags.expr_col
    expr: DENSE_RANK() OVER (PARTITION BY _id ORDER BY _observ_end_dt ASC)
    output: _observ_end_dt_rank

  # Window features
  - object: feature_generation.v1.core.features.windows.generate_window_grid
    funcs:
      - object: pyspark.sql.functions.sum
      - object: pyspark.sql.functions.mean
    inputs:
      - month_total_sales
      - month_net_sales
      - month_total_profit
      - month_total_cost
      - month_total_amount_discounts
      - month_total_qty_discounts
      - month_avg_percent_discount
      - month_total_discount_percentual
      - month_avg_order
      - month_distinct_transactions
      - month_distinct_product_categories
      - month_distinct_skus_sold
      - is_active
      - month_net_sales_category_oil
      - month_total_amount_discounts_category_oil
      - month_net_sales_share_oil
      - month_net_sales_category_oil_synthetic
      - month_total_amount_discounts_category_oil_synthetic
      - month_net_sales_share_oil_synthetic
      - has_oil
      - has_oil_synthetic
    ranges_between: [[-23, 0] ,[-11, 0], [-5, 0]]
    # suffix: _months
    suffix: _months
    windows:
      - order_by:
          - _observ_end_dt_rank
        partition_by:
          - _id

  - object: feature_generation.v1.core.features.windows.generate_window_grid
    funcs:
      - object: pyspark.sql.functions.max
    inputs:
      # - month_avg_run_mileage
      # - oil_run_mileage
      # - customer_run_mileage
      # - customer_avg_mileage_per_day
      # - month_avg_mileage_per_day
      - month_net_sales
      - month_avg_percent_discount
      - month_total_discount_percentual
      - month_avg_order
      - month_distinct_transactions
      - month_distinct_skus_sold
    ranges_between: [[-23, 0] ,[-11, 0], [-5, 0]]
    # suffix: _months
    suffix: _months
    windows:
      - order_by:
          - _observ_end_dt_rank
        partition_by:
          - _id

  - object: feature_generation.v1.core.features.windows.generate_window_grid
    funcs:
      - object: pyspark.sql.functions.mean
      # - object: pyspark.sql.functions.sum
    inputs:
      - month_avg_skus_per_order
      - month_distinct_branches
      - total_transactions_at_morning
      - total_transactions_at_afternoon
      - total_transactions_at_night
      - total_transactions_at_afternight
      - total_transactions_week_1
      - total_transactions_week_2
      - total_transactions_week_3
      - total_transactions_week_4
      - total_transactions_week_5
      # - total_transactions_week_6
      - month_net_sales_share_ac
      - month_net_sales_share_additives
      - month_net_sales_share_air_filter
      - month_net_sales_share_batteries
      - month_net_sales_share_engine
      - month_net_sales_share_fuel
      - month_net_sales_share_gear
      - month_net_sales_share_oil_filter
      - month_net_sales_share_others
      - month_net_sales_share_plug
      - month_net_sales_share_transmission
      - month_net_sales_share_tyres
      - has_oil_filter
      - has_air_filter
      - has_ac
      - has_tires
      - has_batteries
      - has_transmission
      - has_engine
      - has_additives
      - has_plug
      - has_fuel
      - has_gear
      - last_transaction_n_skus

    ranges_between: [[-23, 0] ,[-11, 0], [-5, 0]]
    # suffix: _months
    suffix: _months
    windows:
      - order_by:
          - _observ_end_dt_rank
        partition_by:
          - _id

  - object: feature_generation.v1.core.features.windows.generate_window_grid
    funcs:
      # - object: pyspark.sql.functions.median
      - object: pyspark.sql.functions.mode
    inputs:
      - most_frequent_day_of_week
      - most_frequent_day_of_month
      - most_frequent_week_transaction
      - most_frequent_hour_transaction

    ranges_between: [[-23, 0] ,[-11, 0], [-5, 0]]
    # suffix: _months
    suffix: _months
    windows:
      - order_by:
          - _observ_end_dt_rank
        partition_by:
          - _id


