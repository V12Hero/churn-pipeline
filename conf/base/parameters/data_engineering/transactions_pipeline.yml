
transactions:
  source: "transactions"
  # Intermediate layer -- geometry
  apply: FALSE
  coordinates:
    latitud: NULL
    longitud: NULL
  epsg: NULL
  cols_to_standarize: []
  # Primary layer params
  pivot: NULL
  groups: NULL
  aggregation: NULL
  pre_features:
    order_delivered_at_date:
      type: function_col
      function: transform_to_timestamp
      parameters:
        column: order_delivered_at_date # transaction_date
  post_features: NULL
  global_params: &_global_params
    #sample: 50000
    cols:
      customer_id: ${CUSTOMER_ID_COL}
      days_since: 'days_since_transaction'
      days_between: 'days_between_transactions'
      transaction_date: 'order_delivered_at_date'
      transaction_id: 'transaction_id'
      quantity: 'quantity'
      sales_amount: 'sales_amount'
      has_discount: 'has_discount'
      discount: 'sum_discounted_value'
      product_id: 'sku'
      product_category: 'sku_macro_category_clean'
      gross_profit: 'gross_profit'
    # Overrides config
    # manual_evaluation_dates:
    #   - null # !!timestamp 2023-02-28
    # Optional: date to start generating time series features. If null is the last transaction date
    evaluation_date_start: 2020-07-01 # !!timestamp 2022-11-01
    # Optional: date to finish generating time series features, if null is the same as the start date
    evaluation_date_end: 2025-01-01 # !!timestamp 2022-12-01
    # Optional: time interval to generate time series features
    freq: 'M'
    # Window in days to define if user is active or not
    active_user_window: 30

transactions_90d:
  # Feature layer
  # Global parameters to specify column names and other information
  global_params: *_global_params
  # Different datasets/granularities that will be generated

  dfs:
    per_customer:
      groupby_cols: ['customer_id']
      # available feature groups: ["week", "order", "overall", "frequency"]
      features:
        granularities: ["week", "month", "order"]
        overall: True
        frequency: ["monthly", "weekly", "daily"]
      # Time windows to generate the features
      num_days: [90] # Always keep from largest to smallest

    per_customer_product_group:
      groupby_cols: ['customer_id', 'sku_macro_category_clean']
      features:
        granularities: ["order"]
        overall: True
        frequency: ["daily"]
      # Time windows to generate the features
      num_days: [90] # Always keep from largest to smallest

    per_customer_product_micro_category:
      groupby_cols: ['customer_id', 'sku_micro_category']
      features:
        frequency: ["daily"]
        # filter regex to to include only interest features
        regex: "number_of_transactions((?!_with_discount).)*last_90_days"
      # Time windows to generate the features
      num_days: [90] # Always keep from largest to smallest

    micro_category_activity:
      groupby_cols: ['customer_id', 'sku_micro_category']
      features:
        frequency: ["daily"]
        # filter regex to to include only interest features
        regex: "^active_user.*(?<!days)$"
        prefix: "micro_category_"
      # Time windows to generate the features
      num_days: [30] # Always keep from largest to smallest

  # Column that will be used to join the dfs
  join_col: ['customer_id', 'evaluation_date']
  # Groupby columns for each dataset in DFs
  # Parameters of columns that will be used to calculate percentages of each category
  calculate_percentages:
    dist_micro_category:
      #regex: "number_of_transactions((?!_with_discount).)*last_90_days"
      percentage_cols:
        - 'number_of_transactions_micro_category_1_last_90_days'
      main_col: 'number_of_transactions_last_90_days'
      replace_name: 'number_of_transactions' # look at pattern of columns
      sum_100: True
    frequency_micro_category:
      #regex: "number_of_transactions((?!_with_discount).)*last_90_days"
      percentage_cols:
        - 'number_of_transactions_micro_category_1_last_90_days'
      main_col: 'number_of_transactions_last_90_days'
      replace_name: 'number_of_transactions' # look at pattern of columns
      sum_100: False
    distribution_of_counts_in_order:
      percentage_cols:
        - 'number_of_transactions_category_1_last_90_days'
        - 'number_of_transactions_category_2_last_90_days'
      main_col: 'number_of_transactions_last_90_days'
      replace_name: 'number_of_transactions'
      sum_100: True
    frequency_in_order:
      percentage_cols:
        - 'number_of_transactions_category_1_last_90_days'
        - 'number_of_transactions_category_2_last_90_days'
      main_col: 'number_of_transactions_last_90_days'
      replace_name: 'number_of_transactions'
      sum_100: False
  business_features:
    - function: transactions.nodes._add_churn_column
      parameters:
        churn_col: number_of_transactions_last_90_days
  per_customer_last_order:
    groupby_cols: ['customer_id', 'evaluation_date']
    num_days: [90]
  per_customer_per_sku_last_order:
    groupby_cols: ['customer_id', 'sku', 'evaluation_date']
    num_days: [90]
  select_cols:
    cols_to_select: ["*"]
    cols_to_drop: ["days_since_last_order", "num_orders_last_90_days"]


transactions_120d:
  # Feature layer
  # Global parameters to specify column names and other information
  global_params: *_global_params
  # Different datasets/granularities that will be generated
  dfs:
    per_customer:
      groupby_cols: ['customer_id']
      features:
        granularities: ["week", "month", "order"]
        overall: True
        frequency: ["monthly", "weekly", "daily"]
      # Time windows to generate the features
      num_days: [120] # Always keep from largest to smallest

    per_customer_product_group:
      groupby_cols: ['customer_id', 'sku_macro_category_clean']
      features:
        granularities: ["order"]
        overall: True
        frequency: ["daily"]
      # Time windows to generate the features
      num_days: [120] # Always keep from largest to smallest

    per_customer_product_micro_category:
      prefix: "micro_category"
      # around 88 columns per window (88 * len(num_days))
      groupby_cols: ['customer_id', 'sku_micro_category']
      features:
        granularities: []
        frequency: ["daily"]
        # filter regex to to include only interest features
        regex: "number_of_transactions((?!_with_discount).)*last_(120|90)_days"
      # Time windows to generate the features
      num_days: [120, 90] # Always keep from largest to smallest

    micro_category_activity:
      groupby_cols: ['customer_id', 'sku_micro_category']
      features:
        frequency: ["daily"]
        # filter regex to to include only interest features
        regex: "^active_user.*(?<!days)$"
        prefix: "micro_category_"
      # Time windows to generate the features
      num_days: [30] # Always keep from largest to smallest

  # Column that will be used to join the dfs
  join_col: ['customer_id', 'evaluation_date']
  # Groupby columns for each dataset in DFs
  # Parameters of columns that will be used to calculate percentages of each category
  calculate_percentages:
    distribution_of_counts_in_order:
      percentage_cols:
        - 'number_of_transactions_category_1_last_120_days'
        - 'number_of_transactions_category_2_last_120_days'
      main_col: 'number_of_transactions_last_120_days'
      replace_name: 'number_of_transactions'
      sum_100: True
    frequency_in_order:
      percentage_cols:
        - 'number_of_transactions_category_1_last_120_days'
        - 'number_of_transactions_category_2_last_120_days'
      main_col: 'number_of_transactions_last_120_days'
      replace_name: 'number_of_transactions'
      sum_100: False
    frequency_micro_category:
      percentage_cols:
        - 'number_of_transactions_micro_category_1_last_120_days'
      main_col: 'number_of_transactions_last_120_days'
      replace_name: 'number_of_transactions'
      sum_100: False
    dist_micro_category:
      #regex: "number_of_transactions((?!_with_discount).)*last_90_days"
      percentage_cols:
        - 'number_of_transactions_micro_category_1_last_120_days'
      main_col: 'number_of_transactions_last_90_days'
      replace_name: 'number_of_transactions' # look at pattern of columns
      sum_100: True
  business_features:
    - function: transactions.nodes._add_churn_column
      parameters:
        churn_col: number_of_transactions_last_120_days
  per_customer_last_order:
    groupby_cols: ['customer_id', 'evaluation_date']
    num_days: [120]
  per_customer_per_sku_last_order:
    groupby_cols: ['customer_id', 'sku', 'evaluation_date']
    num_days: [120]
  select_cols:
    cols_to_select: ["*"]
    cols_to_drop: ["days_since_last_order", "num_orders_last_120_days"]


