#Filters for the pre-processing part
petromin.filter_footprint_model_conditions:
  - _observ_end_dt == "2022-12-31"
  - store_typ == "petromin" # TODO: Ingrid Reis -- > change this to TECNO STORES


_target_name: &_target_name
  target: "trx_total_profit_sum_past_11_next_0_months_normalized_m2"


petromin.footprint:
  # create normalized target
  target_creation:
    numerator: trx_total_profit_sum_past_11_next_0_months
    denominator: store_size_m2
    <<: *_target_name

  optuna:
    kwargs_study:
      direction: maximize # TODO: Ingrid Reis --> Make sure that the direction of the optimization make sense
      # Example maximizing R2 score -- Minimizing mean absolute error
      study_name: "footprint_model"
      load_if_exists: False
      # storage: "sqlite:///footprint.db" # if you want to use sqlite set load_if_exists=True

    kwargs_optimize:
      n_trials: 500
    # sampler
    sampler:
      class: optuna.samplers.TPESampler
      kwargs:
        n_startup_trials: 0
        constant_liar: True
    # pruner
    pruner:
      class: optuna.pruners.SuccessiveHalvingPruner
      kwargs: {}

  # how reward function is
  # cross val strategy
  cv_strategy:
    class: sklearn.model_selection.TimeSeriesSplit # TODO: Ingrid Reis Change cross val strategy to k-fold cross validation, time split does not matter
    kwargs:
      n_splits: 3 #TODO: Ingrid Reis Select an appropiate number of splits in order to get a higher r2 score

  # cross val score
  cv_score:
    class: sklearn.model_selection.cross_val_score
    kwargs:
      estimator:
      X: # leave as None
      y: # leave as None
      scoring: "r2" # "neg_mean_squared_error" # TODO Ingrid Reis: validate the sign of the metric
      cv: # leave as None
      n_jobs: -1

  model_artifact:
    <<: *_target_name
    features:
        - pop_density
        - min_distance_community
        - min_distance_educational_establishment
        - min_distance_entertainment
        - min_distance_facilities
        - min_distance_financial_centre
        - min_distance_hospitals
        - min_distance_marketplaces
        - min_distance_money_withdrawal_point
        - min_distance_nightclubs
        - min_distance_restaurants
        - min_distance_transportation
        - min_distance_highway
        - min_distance_pedestrian_highway
        # Geospatial
        - number_of_community_in_a_ratio_of_300_meters
        - number_of_community_in_a_ratio_of_500_meters
        - number_of_community_in_a_ratio_of_750_meters
