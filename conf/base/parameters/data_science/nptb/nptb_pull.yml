initial_date_nptb_pull: '2023-01-01'
min_number_of_trx_for_recommendations_pull: 3 # Number of accumulated transactions needed to get a recommendation. Only clientes with at least N transactions in the past are considered.
n_months_nptb_pull: 12 # Number of historic months to consider for transactions
n_recommendations_pull: 10 # Number of recommendations (keep only the N first SKUs in the ranking)

products_to_drop:
