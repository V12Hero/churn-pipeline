max_store.reporting:
  segmentation:
    cluster_col: cluster_id
    # geographic report params
    geographic_report:
      lat: latitude
      lon: longitude
      color: cluster_id
      size: trx_net_sales_sum_past_5_next_0_months
      size_max: 15
      zoom: 6

    geographic_html_report:
      n_jobs: 6
      environment: ${env}
      template_path: notebooks/reporting/geospatial_cluster_report.ipynb
      namespace: "max_store"
      report_name: geographic_cluster_report
      kernel: python3
      timeout: 90000
      remove_code: True

    transactional_html_report:
      n_jobs: 6
      environment: ${env}
      template_path: notebooks/reporting/transactional_report.ipynb
      namespace: "max_store"
      report_name: transactional_cluster_report
      kernel: python3
      timeout: 90000
      remove_code: True

    # excel report params
