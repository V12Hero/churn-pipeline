filter_model_conditions:
  # - _observ_end_dt >= first_order_dt
  - _observ_end_dt < "2024-01-01" # To Be update before training
  - _observ_end_dt >= "2022-01-01"
  - target_churn_1 IS NOT NULL
  # - is_active > 0
  - below_estimated_mineral_oil_change > 0
  - acc_churn_past_2_next_0_months < 2
  - is_active_sum_past_11_next_0_months > 0
  # - is_active_sum_past_23_next_0_months > 3

filter_churn_validation:
- _observ_end_dt < "2025-05-01"
- _observ_end_dt >= "2024-09-01" # To Be update before training
- target_churn_1 IS NOT NULL
# - is_active > 0
- below_estimated_mineral_oil_change > 0
- acc_churn_past_2_next_0_months < 2
- is_active_sum_past_11_next_0_months > 0
# - is_active_sum_past_23_next_0_months > 3

filter_churn_predict:
  # - is_active_mean_past_11_next_0_months > 0
  - _observ_end_dt >= "2026-03-01" # To Be update before predict
  - _observ_end_dt  < "2026-04-01" # To Be update before predict
  # - is_active_sum_past_11_next_0_months > 1
  # - _observ_end_dt == "${spine_end_dt}"

max_train_size: null
# Prediction definition
probability_threshold: 0.5

special_cols:
- _id
- _observ_end_dt
# - client_name
# - client_last_name
target: target_churn_1
tuning_iterations: 150
tuning_metric_to_maximize: recall
tuning_params_distribution:
  colsample_bytree:
  - 0.7
  - 0.9
  is_unbalance:
  - true
  lambda_l1:
  - 0
  lambda_l2:
  - 0
  learning_rate:
  - 0.01
  - 0.05
  - 0.1
  - 0.2
  - 0.5
  max_depth:
  - 5
  - 3
  - -1
  n_estimators:
  - 300
  - 100
tuning_scoring:
  - recall
  - precision
  - f1
  - ks
  - average_precision
undersampling_rate: null

