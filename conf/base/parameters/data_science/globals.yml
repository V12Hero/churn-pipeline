
# All pipelines
base_path: data # When running locally

# Model pipeline
min_date_model_table: 2024-01-01 # This is the minimum date considered in the modeling pipeline. It is usually 12m after the beginning of the spine
spine_start_dt: 2024-01-01
spine_end_dt: 2025-01-01

# GLOBAL_SEED: 42

# environment
env: base

# Global parameters to create transactional features with the same structure
# Feature are going to be generated by 3, 6 and 12 months
transactional_windows: &transactional_windows
  value: [[-11, 0] ,[-5, 0], [-2, 0]]


# Points of interest [explore point of interest first]
